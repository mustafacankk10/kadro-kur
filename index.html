<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeliÅŸmiÅŸ Kadro Kurucu Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        :root {
            --pitch-color: #388e3c;
            --pitch-line: rgba(255, 255, 255, 0.6);
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --jersey-img: none;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin: 0 0 5px 0; color: #4caf50; }
        
        /* Ãœst Kontrol Paneli */
        .controls {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 20px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.8em;
            color: #aaa;
            font-weight: 600;
        }

        .controls input[type="text"], .controls select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-family: 'Poppins', sans-serif;
            outline: none;
            height: 40px;
            box-sizing: border-box;
        }

        .controls input[type="file"] {
            display: none;
        }

        .file-btn {
            background: #333;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            text-align: center;
            transition: background 0.2s;
            border: 1px solid #444;
            height: 40px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .file-btn:hover { background: #444; }

        /* Ä°ndirme Butonu Stili */
        .btn-download {
            background: #1976d2;
            color: white;
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            height: 40px;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-download:hover { background: #1565c0; transform: translateY(-2px); }
        .btn-download:active { transform: translateY(0); }

        .container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }

        /* GÃ¶rÃ¼ntÃ¼ alÄ±nÄ±rken kenarlarda boÅŸluk kalmasÄ± iÃ§in Ã¶zel ID ayarÄ± */
        #captureArea {
            padding: 20px; /* Ä°ndirilen PNG'nin kenarlarÄ±nda nefes alma payÄ± */
            background-color: var(--bg-color); /* PNG arkaplan rengini koyu temaya sabitler */
            border-radius: 20px;
        }

        /* Futbol SahasÄ± AlanÄ± */
        .pitch-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* TakÄ±m Ä°smi ve Logo AlanÄ± */
        .team-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            min-height: 50px;
        }

        .team-logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
            display: none;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .team-name-display {
            font-size: 1.8em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .pitch {
            width: 380px;
            height: 550px;
            background: repeating-linear-gradient(0deg, #388e3c, #388e3c 55px, #2e7d32 55px, #2e7d32 110px);
            border: 4px solid var(--pitch-line);
            border-radius: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            padding: 15px 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        .pitch::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 3px; background: var(--pitch-line); transform: translateY(-50%); z-index: 0; }
        .pitch::after { content: ""; position: absolute; top: 50%; left: 50%; width: 90px; height: 90px; border: 3px solid var(--pitch-line); border-radius: 50%; transform: translate(-50%, -50%); z-index: 0; }
        .ceza-sahasi-ust, .ceza-sahasi-alt { position: absolute; left: 50%; transform: translateX(-50%); width: 180px; height: 90px; border: 3px solid var(--pitch-line); z-index: 0; }
        .ceza-sahasi-ust { top: 0; border-top: none; }
        .ceza-sahasi-alt { bottom: 0; border-bottom: none; }

        .row { display: flex; justify-content: space-around; z-index: 1; width: 100%; }

        /* Oyuncu KartÄ± */
        .player {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 75px;
            perspective: 1000px;
        }

        .shirt {
            width: 45px;
            height: 45px;
            background-color: #ffffff;
            background-image: var(--jersey-img);
            background-size: cover;
            background-position: center;
            color: #333;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.3em;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
            border: 2px solid #ddd;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .player:hover .shirt { transform: scale(1.15) rotateY(15deg); }

        body.has-jersey .shirt {
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            text-shadow: 2px 2px 4px #000, -1px -1px 2px #000, 1px -1px 2px #000, -1px 1px 2px #000;
        }

        .player.filled .shirt:not(.has-jersey) { background-color: #ffb300; border-color: #ff8f00; color: #000; }
        body.has-jersey .player.filled .shirt { background-color: transparent; }

        .player-name {
            margin-top: 6px;
            font-size: 0.75em;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.8);
            padding: 3px 8px;
            border-radius: 12px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            color: #fff;
            letter-spacing: 0.5px;
            border: 1px solid #444;
            transition: transform 0.3s;
        }
        
        .player:hover .player-name { transform: translateY(3px); }

        /* Yedekler */
        .sidebar { background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); width: 320px; display: flex; flex-direction: column; }
        .sidebar h2 { margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 10px; color: #4caf50; text-align: center; }
        .yedekler-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal { background: #222; padding: 30px; border-radius: 15px; width: 320px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); text-align: center; border: 1px solid #333; }
        .modal h3 { margin-top: 0; color: #4caf50; font-size: 1.4em; }
        .modal input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 8px; background: #121212; color: white; font-family: 'Poppins', sans-serif; outline: none; transition: border-color 0.2s; }
        .modal input:focus { border-color: #4caf50; }
        .modal-btns { display: flex; justify-content: space-between; margin-top: 20px; }
        
        button.btn-modal { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 600; transition: opacity 0.2s, transform 0.1s; }
        button.btn-modal:hover { opacity: 0.85; transform: translateY(-2px); }
        .btn-save { background: #4caf50; color: white; width: 45%; }
        .btn-remove { background: #e53935; color: white; width: 25%; }
        .btn-cancel { background: #757575; color: white; width: 25%; }

        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; }
            .pitch { width: 100%; max-width: 350px; height: 500px; }
            .sidebar { width: 100%; max-width: 350px; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <h1>âš½ Kadro Kur Pro</h1>

    <div class="controls">
        <div class="control-group">
            <label>TakÄ±m Ä°smi</label>
            <input type="text" id="teamNameInput" placeholder="Ã–rn: Galatasaray" onkeyup="updateTeamName()">
        </div>
        <div class="control-group">
            <label>DiziliÅŸ</label>
            <select id="formationSelect" onchange="changeFormation()">
                <option value="4-4-2">4-4-2</option>
                <option value="4-3-3">4-3-3</option>
                <option value="4-2-3-1">4-2-3-1</option>
                <option value="3-5-2">3-5-2</option>
                <option value="5-3-2">5-3-2</option>
            </select>
        </div>
        <div class="control-group">
            <label>TakÄ±m Logosu</label>
            <label class="file-btn" for="logoUpload">ğŸ“· Logo SeÃ§</label>
            <input type="file" id="logoUpload" accept="image/*" onchange="loadLogo(event)">
        </div>
        <div class="control-group">
            <label>3D Forma Ekle</label>
            <label class="file-btn" for="jerseyUpload">ğŸ‘• Forma SeÃ§</label>
            <input type="file" id="jerseyUpload" accept="image/*" onchange="loadJersey(event)">
        </div>
        
        <div class="control-group">
            <label>PaylaÅŸ</label>
            <button class="btn-download" onclick="downloadPitch()">â¬‡ï¸ PNG Ä°ndir</button>
        </div>
    </div>

    <div class="container" id="captureArea">
        
        <div class="pitch-container">
            <div class="team-header">
                <img id="teamLogo" class="team-logo" src="" alt="Logo">
                <div id="teamNameDisplay" class="team-name-display">TAKIM Ä°SMÄ°</div>
            </div>
            
            <div class="pitch" id="pitch">
                <div class="ceza-sahasi-ust"></div>
                <div class="ceza-sahasi-alt"></div>
                </div>
        </div>

        <div class="sidebar">
            <h2>ğŸª‘ Yedekler</h2>
            <div class="yedekler-grid" id="yedekler-container">
                <script>
                    for(let i=0; i<6; i++) {
                        document.write(`
                        <div class="player" onclick="openModal(this)">
                            <div class="shirt">+</div><div class="player-name">Yedek</div>
                        </div>
                        `);
                    }
                </script>
            </div>
        </div>
        
    </div>

    <div class="modal-overlay" id="playerModal">
        <div class="modal">
            <h3>Oyuncu DÃ¼zenle</h3>
            <input type="text" id="playerName" placeholder="Oyuncu AdÄ± (Ã–rn: Icardi)" autocomplete="off">
            <input type="number" id="playerNumber" placeholder="Forma No (Ã–rn: 9)" autocomplete="off" min="1" max="99">
            <div class="modal-btns">
                <button class="btn-modal btn-cancel" onclick="closeModal()">Ä°ptal</button>
                <button class="btn-modal btn-remove" onclick="removePlayer()">Temizle</button>
                <button class="btn-modal btn-save" onclick="savePlayer()">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. DÄ°ZÄ°LÄ°Å SÄ°STEMÄ° ---
        const formations = {
            "4-4-2": [2, 4, 4, 1],
            "4-3-3": [3, 3, 4, 1],
            "4-2-3-1": [1, 3, 2, 4, 1],
            "3-5-2": [2, 5, 3, 1],
            "5-3-2": [2, 3, 5, 1]
        };

        function renderPitch(formationKey) {
            const pitch = document.getElementById('pitch');
            const rows = pitch.querySelectorAll('.row');
            rows.forEach(row => row.remove());

            const lines = formations[formationKey];
            
            lines.forEach(playerCount => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                
                for(let i=0; i<playerCount; i++) {
                    const playerDiv = document.createElement('div');
                    playerDiv.className = 'player';
                    playerDiv.setAttribute('onclick', 'openModal(this)');
                    playerDiv.innerHTML = `<div class="shirt">+</div><div class="player-name">Ekle</div>`;
                    rowDiv.appendChild(playerDiv);
                }
                pitch.appendChild(rowDiv);
            });
        }

        function changeFormation() {
            if(confirm("DiziliÅŸi deÄŸiÅŸtirmek sahadaki oyuncularÄ± sÄ±fÄ±rlar. Emin misin?")) {
                const selected = document.getElementById('formationSelect').value;
                renderPitch(selected);
            }
        }

        // --- 2. GÃ–RSEL EKLEMELER (Logo & Forma) ---
        function updateTeamName() {
            const inputVal = document.getElementById('teamNameInput').value;
            document.getElementById('teamNameDisplay').innerText = inputVal || 'TAKIM Ä°SMÄ°';
        }

        function loadLogo(event) {
            const logoImg = document.getElementById('teamLogo');
            const file = event.target.files[0];
            if(file) {
                logoImg.src = URL.createObjectURL(file);
                logoImg.style.display = 'block';
            }
        }

        function loadJersey(event) {
            const file = event.target.files[0];
            if(file) {
                const imageUrl = URL.createObjectURL(file);
                document.documentElement.style.setProperty('--jersey-img', `url(${imageUrl})`);
                document.body.classList.add('has-jersey');
            }
        }

        // --- 3. MODAL (Oyuncu DÃ¼zenleme) ---
        let selectedPlayerElement = null;
        const modal = document.getElementById('playerModal');
        const nameInput = document.getElementById('playerName');
        const numberInput = document.getElementById('playerNumber');

        function openModal(element) {
            selectedPlayerElement = element;
            if(element.classList.contains('filled')) {
                nameInput.value = element.querySelector('.player-name').innerText;
                numberInput.value = element.querySelector('.shirt').innerText;
            } else {
                nameInput.value = '';
                numberInput.value = '';
            }
            modal.style.display = 'flex';
            setTimeout(() => nameInput.focus(), 100);
        }

        function closeModal() {
            modal.style.display = 'none';
            selectedPlayerElement = null;
        }

        function savePlayer() {
            if(!selectedPlayerElement) return;
            const name = nameInput.value.trim();
            const number = numberInput.value.trim();

            if(name === '' || number === '') {
                alert("LÃ¼tfen isim ve forma numarasÄ± girin.");
                return;
            }

            selectedPlayerElement.querySelector('.player-name').innerText = name;
            selectedPlayerElement.querySelector('.shirt').innerText = number;
            selectedPlayerElement.classList.add('filled');
            closeModal();
        }

        function removePlayer() {
            if(!selectedPlayerElement) return;
            const isYedek = selectedPlayerElement.closest('.yedekler-grid') !== null;
            selectedPlayerElement.querySelector('.player-name').innerText = isYedek ? 'Yedek' : 'Ekle';
            selectedPlayerElement.querySelector('.shirt').innerText = '+';
            selectedPlayerElement.classList.remove('filled');
            closeModal();
        }

        // --- 4. PNG Ä°NDÄ°RME SÄ°STEMÄ° ---
        function downloadPitch() {
            const captureElement = document.getElementById('captureArea');
            
            let fileName = document.getElementById('teamNameInput').value.trim();
            if(!fileName) fileName = "Kadro";
            fileName = fileName.replace(/\s+/g, '_') + "_Kadro.png";
            
            html2canvas(captureElement, {
                backgroundColor: "#121212", // VÃ¼cut rengi ile aynÄ± (Siyah/Koyu gri)
                scale: 2, 
                useCORS: true, 
                logging: false 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                console.error("GÃ¶rÃ¼ntÃ¼ alÄ±nÄ±rken bir hata oluÅŸtu: ", err);
                alert("Kadro indirilirken bir sorun oluÅŸtu.");
            });
        }

        // --- BaÅŸlangÄ±Ã§ AyarlarÄ± ---
        window.onload = () => {
            renderPitch('4-4-2');
        };
    </script>
</body>
</html>
