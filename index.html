<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Kadro Kurucu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        :root {
            --primary-color: #2e7d32;
            --pitch-color: #388e3c;
            --pitch-line: rgba(255, 255, 255, 0.6);
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 5px;
            color: #4caf50;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            text-align: center;
            font-size: 0.9em;
            color: #aaaaaa;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }

        /* Futbol Sahası */
        .pitch-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .pitch {
            width: 350px;
            height: 500px;
            background: repeating-linear-gradient(
                0deg,
                #388e3c,
                #388e3c 50px,
                #2e7d32 50px,
                #2e7d32 100px
            );
            border: 4px solid var(--pitch-line);
            border-radius: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            padding: 10px 0;
            box-sizing: border-box;
        }

        /* Saha Çizgileri */
        .pitch::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--pitch-line);
            transform: translateY(-50%);
            z-index: 0;
        }
        .pitch::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            border: 3px solid var(--pitch-line);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
        .ceza-sahasi-ust, .ceza-sahasi-alt {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 80px;
            border: 3px solid var(--pitch-line);
            z-index: 0;
        }
        .ceza-sahasi-ust {
            top: 0;
            border-top: none;
        }
        .ceza-sahasi-alt {
            bottom: 0;
            border-bottom: none;
        }

        .row {
            display: flex;
            justify-content: space-around;
            z-index: 1;
            width: 100%;
        }

        /* Oyuncu Kartı */
        .player {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
            width: 70px;
        }

        .player:hover {
            transform: scale(1.15);
        }

        .shirt {
            width: 40px;
            height: 40px;
            background: #ffffff;
            color: #333;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 1.2em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            border: 2px solid #ddd;
            transition: all 0.3s;
        }

        /* Dolu Oyuncu Efekti */
        .player.filled .shirt {
            background: #ffb300; 
            color: #000;
            border-color: #ff8f00;
        }

        .player-name {
            margin-top: 5px;
            font-size: 0.75em;
            background: rgba(0, 0, 0, 0.7);
            padding: 3px 8px;
            border-radius: 12px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            color: #fff;
            letter-spacing: 0.5px;
        }

        /* Yedekler ve Kontroller */
        .sidebar {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 320px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            margin-top: 0;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            color: #4caf50;
            text-align: center;
        }

        .yedekler-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        /* Modal (Açılır Pencere) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid #333;
        }

        .modal h3 {
            margin-top: 0;
            color: #4caf50;
            font-size: 1.4em;
        }

        .modal input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #444;
            border-radius: 8px;
            background: #121212;
            color: white;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal input:focus {
            border-color: #4caf50;
        }

        .modal-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover { opacity: 0.85; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .btn-save { background: #4caf50; color: white; width: 45%; }
        .btn-remove { background: #e53935; color: white; width: 25%; }
        .btn-cancel { background: #757575; color: white; width: 25%; }

        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; }
            .pitch { width: 320px; height: 460px; }
            .sidebar { width: 320px; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <h1>⚽ Kadro Kurucu</h1>
    <div class="subtitle">Oyuncu eklemek veya düzenlemek için yuvarlaklara tıkla (4-4-2)</div>

    <div class="container">
        <div class="pitch-container">
            <div class="pitch">
                <div class="ceza-sahasi-ust"></div>
                <div class="ceza-sahasi-alt"></div>
                
                <div class="row">
                    <div class="player" onclick="openModal(this)">
                        <div class="shirt">+</div><div class="player-name">Ekle</div>
                    </div>
                    <div class="player" onclick="openModal(this)">
                        <div class="shirt">+</div><div class="player-name">Ekle</div>
                    </div>
                </div>

                <div class="row">
                    <div class="player" onclick="openModal(this)">
                        <div class="shirt">+</div><div class="player-name">Ekle</div>
                    </div>
                    <div class="player" onclick="openModal(this)">
                        <div class="shirt">+</div><div class="player-name">Ekle</div>
                    </div>
                    <div class="player" onclick="openModal(this)">
                        <div class="shirt">+</div><div class="player-name">Ekle</div>
                    </div>
                    <div class="player" onclick="openModal(this)">
                        <div class="shirt">+</div><div class="player-name">Ekle</div>
                    </div>
                </div>

                <div class="row">
                    <div class="player" onclick="openModal(this)">
                        <div class="shirt">+</div><div class="player-name">Ekle</div>
                    </div>
                    <div class="player" onclick="openModal(this)">
                        <div class="shirt">+</div><div class="player-name">Ekle</div>
                    </div>
                    <div class="player" onclick="openModal(this)">
                        <div class="shirt">+</div><div class="player-name">Ekle</div>
                    </div>
                    <div class="player" onclick="openModal(this)">
                        <div class="shirt">+</div><div class="player-name">Ekle</div>
                    </div>
                </div>

                <div class="row">
                    <div class="player" onclick="openModal(this)">
                        <div class="shirt">+</div><div class="player-name">Ekle</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <h2>🪑 Yedekler</h2>
            <div class="yedekler-grid" id="yedekler-container">
                <script>
                    for(let i=0; i<6; i++) {
                        document.write(`
                        <div class="player" onclick="openModal(this)">
                            <div class="shirt">+</div><div class="player-name">Yedek</div>
                        </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="playerModal">
        <div class="modal">
            <h3>Oyuncu Kartı</h3>
            <input type="text" id="playerName" placeholder="Oyuncu Adı (Örn: Icardi)" autocomplete="off">
            <input type="number" id="playerNumber" placeholder="Forma No (Örn: 9)" autocomplete="off" min="1" max="99">
            
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">İptal</button>
                <button class="btn-remove" onclick="removePlayer()">Sil</button>
                <button class="btn-save" onclick="savePlayer()">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        let selectedPlayerElement = null;

        const modal = document.getElementById('playerModal');
        const nameInput = document.getElementById('playerName');
        const numberInput = document.getElementById('playerNumber');

        // Modalı (Pencereyi) açma fonksiyonu
        function openModal(element) {
            selectedPlayerElement = element;
            
            // Eğer daha önceden oyuncu eklenmişse (doluysa), inputlara o bilgileri yazdır
            if(element.classList.contains('filled')) {
                nameInput.value = element.querySelector('.player-name').innerText;
                numberInput.value = element.querySelector('.shirt').innerText;
            } else {
                nameInput.value = '';
                numberInput.value = '';
            }

            modal.style.display = 'flex';
            setTimeout(() => nameInput.focus(), 100);
        }

        // Modalı kapatma fonksiyonu
        function closeModal() {
            modal.style.display = 'none';
            selectedPlayerElement = null;
        }

        // Oyuncuyu kaydetme fonksiyonu
        function savePlayer() {
            if(!selectedPlayerElement) return;

            const name = nameInput.value.trim();
            const number = numberInput.value.trim();

            if(name === '' || number === '') {
                alert("Lütfen isim ve forma numarası girin.");
                return;
            }

            // Seçilen kartın içine bilgileri yaz
            selectedPlayerElement.querySelector('.player-name').innerText = name;
            selectedPlayerElement.querySelector('.shirt').innerText = number;
            selectedPlayerElement.classList.add('filled');

            closeModal();
        }

        // Oyuncuyu silme / boşaltma fonksiyonu
        function removePlayer() {
            if(!selectedPlayerElement) return;

            // Yedek mi saha içi mi olduğunu kontrol edip varsayılan isme dön
            const isYedek = selectedPlayerElement.closest('.yedekler-grid') !== null;

            selectedPlayerElement.querySelector('.player-name').innerText = isYedek ? 'Yedek' : 'Ekle';
            selectedPlayerElement.querySelector('.shirt').innerText = '+';
            selectedPlayerElement.classList.remove('filled');

            closeModal();
        }
    </script>
</body>
</html>
