<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kadro Kurucu</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #0a1f0a;
    --green-field: #1a5c1a;
    --green-light: #22761e;
    --green-stripe: #1e6b1a;
    --accent: #e8c84a;
    --accent2: #ff4d4d;
    --white: #f0f0e8;
    --gray: #8a9080;
    --panel-bg: #0d1a0d;
    --panel-border: #2a3d2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050e05;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--panel-border);
    background: var(--panel-bg);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .formation-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .formation-btn {
    background: #162416;
    border: 1px solid var(--panel-border);
    color: var(--gray);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 1px;
    transition: all 0.18s;
  }

  .formation-btn:hover { border-color: var(--accent); color: var(--accent); }
  .formation-btn.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }

  .main {
    display: flex;
    flex: 1;
    gap: 0;
    overflow: hidden;
  }

  /* ---- PITCH ---- */
  .pitch-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  .pitch {
    position: relative;
    width: min(520px, 90vw);
    aspect-ratio: 65 / 100;
    background: var(--green-field);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 0 0 3px rgba(255,255,255,0.08);
  }

  /* Stripes */
  .pitch::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      180deg,
      transparent 0px,
      transparent 47px,
      rgba(0,0,0,0.07) 47px,
      rgba(0,0,0,0.07) 94px
    );
  }

  .pitch-lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .pitch-lines svg {
    width: 100%;
    height: 100%;
  }

  .positions-layer {
    position: absolute;
    inset: 0;
  }

  /* ---- PLAYER SLOT ---- */
  .player-slot {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    z-index: 10;
    transition: transform 0.15s;
  }

  .player-slot:hover { transform: translate(-50%, -50%) scale(1.08); }

  .player-circle {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #1a3a1a;
    border: 2px solid rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.15rem;
    position: relative;
    transition: all 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .player-slot.filled .player-circle {
    background: linear-gradient(135deg, #1e4a8a, #2a5fa8);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(232,200,74,0.4), 0 2px 8px rgba(0,0,0,0.5);
  }

  .player-slot.gk .player-circle {
    background: linear-gradient(135deg, #5a2a00, #8a3e00);
    border-color: #ff8c00;
    box-shadow: 0 0 12px rgba(255,140,0,0.3);
  }

  .player-number {
    position: absolute;
    top: -5px;
    right: -5px;
    background: var(--accent);
    color: #0a0a0a;
    font-size: 0.55rem;
    font-weight: 800;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .player-name {
    margin-top: 4px;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-align: center;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    max-width: 60px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-pos-tag {
    font-size: 0.5rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
  }

  /* ---- SIDE PANEL ---- */
  .side-panel {
    width: 260px;
    background: var(--panel-bg);
    border-left: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--panel-border);
  }

  .panel-section h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .bench-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 12px 16px;
    overflow-y: auto;
    flex: 1;
  }

  .bench-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 8px 4px;
    border-radius: 6px;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .bench-slot:hover { background: #162416; border-color: var(--panel-border); }

  .bench-circle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #162416;
    border: 1.5px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    transition: all 0.15s;
  }

  .bench-slot.filled .bench-circle {
    background: linear-gradient(135deg, #1e4a8a, #2a5fa8);
    border-color: rgba(232,200,74,0.5);
  }

  .bench-name {
    font-size: 0.55rem;
    font-weight: 700;
    text-align: center;
    color: var(--gray);
    max-width: 54px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bench-slot.filled .bench-name { color: #fff; }

  .bench-label {
    font-size: 0.5rem;
    color: var(--accent);
    font-weight: 700;
  }

  /* ---- MODAL ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #0d1a0d;
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 24px;
    width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }

  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .modal label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--gray);
    letter-spacing: 1px;
    margin-bottom: 5px;
  }

  .modal input {
    width: 100%;
    background: #162416;
    border: 1px solid var(--panel-border);
    color: var(--white);
    padding: 9px 12px;
    border-radius: 5px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .modal input:focus { border-color: var(--accent); }

  .modal-btns {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .btn {
    flex: 1;
    padding: 9px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .btn-primary { background: var(--accent); color: #0a0a0a; }
  .btn-primary:hover { background: #f0d060; }
  .btn-danger { background: #3a1010; color: var(--accent2); border: 1px solid #5a1515; }
  .btn-danger:hover { background: #5a1515; }
  .btn-cancel { background: #162416; color: var(--gray); border: 1px solid var(--panel-border); }
  .btn-cancel:hover { color: var(--white); }

  /* tooltip */
  .tip {
    font-size: 0.7rem;
    color: var(--gray);
    margin-bottom: 4px;
    text-align: center;
    padding: 0 16px;
  }

  .formation-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.08);
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    white-space: nowrap;
  }

  @media (max-width: 700px) {
    .main { flex-direction: column; }
    .side-panel { width: 100%; border-left: none; border-top: 1px solid var(--panel-border); }
    .bench-grid { grid-template-columns: repeat(7, 1fr); }
    header { flex-direction: column; gap: 10px; }
    .pitch-wrap { padding: 10px; }
  }
</style>
</head>
<body>

<header>
  <h1>⚽ Kadro Kurucu</h1>
  <div class="formation-bar" id="formationBar"></div>
</header>

<div class="main">
  <div class="pitch-wrap">
    <div class="pitch" id="pitch">
      <!-- SVG Lines -->
      <div class="pitch-lines">
        <svg viewBox="0 0 100 154" preserveAspectRatio="none">
          <!-- Outer border -->
          <rect x="5" y="4" width="90" height="146" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
          <!-- Halfway -->
          <line x1="5" y1="77" x2="95" y2="77" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
          <!-- Centre circle -->
          <circle cx="50" cy="77" r="13" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
          <circle cx="50" cy="77" r="0.8" fill="rgba(255,255,255,0.3)"/>
          <!-- Top penalty area -->
          <rect x="23" y="4" width="54" height="22" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
          <!-- Top goal area -->
          <rect x="35" y="4" width="30" height="8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
          <!-- Top penalty spot -->
          <circle cx="50" cy="18" r="0.8" fill="rgba(255,255,255,0.3)"/>
          <!-- Top penalty arc -->
          <path d="M 37 26 A 13 13 0 0 1 63 26" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
          <!-- Bottom penalty area -->
          <rect x="23" y="128" width="54" height="22" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
          <!-- Bottom goal area -->
          <rect x="35" y="142" width="30" height="8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
          <!-- Bottom penalty spot -->
          <circle cx="50" cy="136" r="0.8" fill="rgba(255,255,255,0.3)"/>
          <!-- Bottom penalty arc -->
          <path d="M 37 128 A 13 13 0 0 0 63 128" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
          <!-- Corner arcs -->
          <path d="M 5 8 A 4 4 0 0 1 9 4" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
          <path d="M 91 4 A 4 4 0 0 1 95 8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
          <path d="M 5 146 A 4 4 0 0 0 9 150" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
          <path d="M 91 150 A 4 4 0 0 0 95 146" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
        </svg>
      </div>
      <div class="positions-layer" id="positionsLayer"></div>
      <div class="formation-display" id="formationDisplay">4-4-2</div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-section">
      <h3>🪑 Yedekler</h3>
      <p class="tip">Tıkla → oyuncu ekle veya düzenle</p>
    </div>
    <div class="bench-grid" id="benchGrid"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Oyuncu Ekle</h2>
    <label>AD SOYAD</label>
    <input type="text" id="inputName" placeholder="Örn: Arda Güler" maxlength="24">
    <label>FORMA NUMARASI</label>
    <input type="number" id="inputNumber" placeholder="Örn: 10" min="1" max="99">
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="savePlayer()">Kaydet</button>
      <button class="btn btn-danger" id="removeBtn" onclick="removePlayer()">Kaldır</button>
      <button class="btn btn-cancel" onclick="closeModal()">İptal</button>
    </div>
  </div>
</div>

<script>
const FORMATIONS = {
  '4-4-2':  { rows: [[1],[4],[4],[2]], label:'4-4-2' },
  '4-3-3':  { rows: [[1],[4],[3],[3]], label:'4-3-3' },
  '4-2-3-1':{ rows: [[1],[4],[2],[3],[1]], label:'4-2-3-1' },
  '3-5-2':  { rows: [[1],[3],[5],[2]], label:'3-5-2' },
  '3-4-3':  { rows: [[1],[3],[4],[3]], label:'3-4-3' },
  '5-3-2':  { rows: [[1],[5],[3],[2]], label:'5-3-2' },
  '4-1-4-1':{ rows: [[1],[4],[1],[4],[1]], label:'4-1-4-1' },
  '4-5-1':  { rows: [[1],[4],[5],[1]], label:'4-5-1' },
};

const EMOJIS = ['👤','⚽','🦵','💪','🧤'];
const BENCH_SIZE = 7;

let currentFormation = '4-4-2';
let players = {}; // key: 'field-i' or 'bench-i'
let editTarget = null;

function getPositionLabel(rowIdx, totalRows, posIdx, rowCount) {
  if (rowIdx === totalRows - 1 && totalRows > 1) { // last = GK
    return 'KAL';
  }
  const fromTop = rowIdx; // 0 = attackers
  if (fromTop === 0) {
    if (rowCount >= 3) return posIdx === 0 ? 'SOL FRW' : posIdx === rowCount-1 ? 'SAĞ FRW' : 'ORT FRW';
    return rowCount === 2 ? (posIdx===0?'SOL SAN':'SAĞ SAN') : 'SAN';
  }
  if (fromTop === totalRows - 2) return posIdx===0?'SOL BEK':posIdx===rowCount-1?'SAĞ BEK':rowCount>3?'STR BEK':'BEK';
  return posIdx===0?'SOL ORT':posIdx===rowCount-1?'SAĞ ORT':'ORT';
}

function buildFormationBtns() {
  const bar = document.getElementById('formationBar');
  bar.innerHTML = '';
  Object.keys(FORMATIONS).forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'formation-btn' + (key===currentFormation?' active':'');
    btn.textContent = key;
    btn.onclick = () => setFormation(key);
    bar.appendChild(btn);
  });
}

function setFormation(key) {
  currentFormation = key;
  buildFormationBtns();
  buildPitch();
  document.getElementById('formationDisplay').textContent = key;
}

function buildPitch() {
  const layer = document.getElementById('positionsLayer');
  layer.innerHTML = '';

  const { rows } = FORMATIONS[currentFormation];
  const totalRows = rows.length;

  // pitch layout: top = attack (index 0), bottom = GK (last)
  // We'll map rows to Y positions 8% ... 88%
  const yStart = 8, yEnd = 88;
  const rowGap = (yEnd - yStart) / (totalRows - 1);

  let slotIdx = 0;
  rows.forEach((count, rowIdx) => {
    const y = yStart + rowIdx * rowGap;
    for (let posIdx = 0; posIdx < count; posIdx++) {
      const x = count === 1 ? 50 : 10 + (posIdx / (count-1)) * 80;
      const key = `field-${slotIdx}`;
      const isGK = rowIdx === totalRows - 1;
      const posLabel = getPositionLabel(rowIdx, totalRows, posIdx, count);
      const p = players[key];

      const slot = document.createElement('div');
      slot.className = 'player-slot' + (p?(' filled'+(isGK?' gk':'')):'') ;
      slot.style.left = x + '%';
      slot.style.top = y + '%';
      slot.dataset.key = key;
      slot.dataset.pos = posLabel;
      slot.onclick = () => openModal(key, posLabel, false);

      slot.innerHTML = `
        <div class="player-circle">
          ${p ? '' : '<span style="font-size:1.1rem;opacity:0.3">+</span>'}
          ${p?.number ? `<div class="player-number">${p.number}</div>` : ''}
        </div>
        <div class="player-name">${p?.name || ''}</div>
        <div class="player-pos-tag">${posLabel}</div>
      `;

      layer.appendChild(slot);
      slotIdx++;
    }
  });
}

function buildBench() {
  const grid = document.getElementById('benchGrid');
  grid.innerHTML = '';
  for (let i = 0; i < BENCH_SIZE; i++) {
    const key = `bench-${i}`;
    const p = players[key];
    const slot = document.createElement('div');
    slot.className = 'bench-slot' + (p?' filled':'');
    slot.onclick = () => openModal(key, 'YEDEK', true);
    slot.innerHTML = `
      <div class="bench-circle">${p?'👕':'+'}</div>
      <div class="bench-name">${p?.name || `Y${i+1}`}</div>
      <div class="bench-label">${p ? (p.number ? '#'+p.number : 'YEDEK') : ''}</div>
    `;
    grid.appendChild(slot);
  }
}

function openModal(key, pos, isBench) {
  editTarget = { key, pos, isBench };
  const p = players[key];
  document.getElementById('modalTitle').textContent = (isBench ? '🪑 Yedek' : '⚽ ' + pos) + ' — Oyuncu';
  document.getElementById('inputName').value = p?.name || '';
  document.getElementById('inputNumber').value = p?.number || '';
  document.getElementById('removeBtn').style.display = p ? 'block' : 'none';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('inputName').focus(), 50);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editTarget = null;
}

function savePlayer() {
  if (!editTarget) return;
  const name = document.getElementById('inputName').value.trim();
  const number = document.getElementById('inputNumber').value;
  if (!name) { document.getElementById('inputName').style.borderColor='var(--accent2)'; return; }
  players[editTarget.key] = { name, number: number ? parseInt(number) : null };
  closeModal();
  refresh();
}

function removePlayer() {
  if (!editTarget) return;
  delete players[editTarget.key];
  closeModal();
  refresh();
}

function refresh() {
  buildPitch();
  buildBench();
}

// Close on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});

// Enter to save
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('open')) savePlayer();
  if (e.key === 'Escape') closeModal();
});

// INIT
buildFormationBtns();
buildPitch();
buildBench();
</script>
</body>
</html>
