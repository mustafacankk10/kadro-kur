<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kadro Kurucu Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap');
:root{--pl:rgba(255,255,255,0.65);--bg:#0d0d0d;--card:#181818;--acc:#f5c518;--txt:#f0f0f0;--sub:#aaa;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:18px;display:flex;flex-direction:column;align-items:center;background-image:radial-gradient(ellipse at top,#1a2e1a 0%,#0d0d0d 60%);}
header{text-align:center;margin-bottom:18px;}
header h1{font-family:'Bebas Neue',sans-serif;font-size:2.6em;letter-spacing:4px;color:var(--acc);text-shadow:0 0 30px rgba(245,197,24,.3);line-height:1;}
header p{color:var(--sub);font-size:.82em;margin-top:4px;}
.controls{background:var(--card);border:1px solid #2a2a2a;padding:14px 20px;border-radius:14px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;width:100%;max-width:920px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.cg{display:flex;flex-direction:column;gap:5px;min-width:145px;}
.cg label{font-size:.70em;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.cg select,.cg input[type=text]{padding:9px 12px;border-radius:10px;border:1px solid #333;background:#111;color:var(--txt);font-family:'Nunito',sans-serif;font-size:.90em;font-weight:600;outline:none;transition:border-color .2s;}
.cg select:focus,.cg input[type=text]:focus{border-color:var(--acc);}
.cg input[type=file]{display:none;}
.fbtn{background:#1e1e1e;color:var(--txt);padding:9px 14px;border-radius:10px;cursor:pointer;font-size:.86em;font-weight:700;text-align:center;border:1px solid #333;transition:all .2s;user-select:none;}
.fbtn:hover{background:#2a2a2a;border-color:#555;}
.sbtn{background:linear-gradient(135deg,#f5c518,#e6a800);color:#111;padding:10px 20px;border-radius:10px;cursor:pointer;font-size:.90em;font-weight:800;border:none;letter-spacing:.5px;transition:all .2s;align-self:flex-end;box-shadow:0 4px 14px rgba(245,197,24,.3);}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(245,197,24,.4);}
.main{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;max-width:1100px;width:100%;}
.pw{background:var(--card);border:1px solid #2a2a2a;padding:18px;border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;}
.th{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
#tlogo{width:52px;height:52px;object-fit:contain;display:none;filter:drop-shadow(0 2px 8px rgba(0,0,0,.7));border-radius:6px;}
#tname{font-family:'Bebas Neue',sans-serif;font-size:2em;letter-spacing:3px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.pitch{width:390px;height:560px;background:repeating-linear-gradient(0deg,#2e7d32 0,#2e7d32 56px,#268126 56px,#268126 112px);border:3px solid var(--pl);border-radius:12px;position:relative;overflow:hidden;}
.pl{position:absolute;inset:0;pointer-events:none;z-index:1;}
.lh{position:absolute;top:50%;left:0;right:0;height:2px;background:var(--pl);transform:translateY(-50%);}
.cc{position:absolute;top:50%;left:50%;width:88px;height:88px;border:2px solid var(--pl);border-radius:50%;transform:translate(-50%,-50%);}
.cd{position:absolute;top:50%;left:50%;width:8px;height:8px;background:var(--pl);border-radius:50%;transform:translate(-50%,-50%);}
.bt{position:absolute;top:0;left:50%;width:175px;height:88px;border:2px solid var(--pl);border-top:none;transform:translateX(-50%);}
.bb{position:absolute;bottom:0;left:50%;width:175px;height:88px;border:2px solid var(--pl);border-bottom:none;transform:translateX(-50%);}
.st{position:absolute;top:0;left:50%;width:90px;height:40px;border:2px solid var(--pl);border-top:none;transform:translateX(-50%);}
.sb{position:absolute;bottom:0;left:50%;width:90px;height:40px;border:2px solid var(--pl);border-bottom:none;transform:translateX(-50%);}
#pl2{position:absolute;inset:0;z-index:2;}
.player{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:grab;width:72px;transform:translate(-50%,-50%);user-select:none;z-index:3;}
.player:active{cursor:grabbing;z-index:99;}
.shirt{width:46px;height:46px;background:#fff;border-radius:50%;display:flex;justify-content:center;align-items:center;font-weight:800;font-size:1.15em;color:#222;box-shadow:0 4px 14px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.8);transition:transform .2s cubic-bezier(.34,1.56,.64,1);background-size:cover;background-position:center;flex-shrink:0;}
.player:hover .shirt{transform:scale(1.18);}
.player.filled .shirt{background-color:var(--acc);color:#111;border-color:#ffdd00;}
.player.hj .shirt{border-radius:10px;color:#fff;text-shadow:1px 1px 3px #000,-1px -1px 3px #000;}
.pname{margin-top:4px;font-size:.70em;font-weight:800;background:rgba(0,0,0,.85);padding:2px 7px;border-radius:20px;white-space:nowrap;max-width:84px;overflow:hidden;text-overflow:ellipsis;color:#fff;border:1px solid rgba(255,255,255,.12);text-align:center;}
.ppos{font-size:.60em;font-weight:700;background:rgba(245,197,24,.15);color:var(--acc);padding:1px 6px;border-radius:20px;margin-top:2px;white-space:nowrap;max-width:84px;overflow:hidden;text-overflow:ellipsis;text-align:center;border:1px solid rgba(245,197,24,.3);}
.ppos:empty{display:none;}
.hint{font-size:.73em;color:#555;text-align:center;margin-top:8px;}
.side{background:var(--card);border:1px solid #2a2a2a;padding:20px;border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.6);width:275px;display:flex;flex-direction:column;}
.side h2{font-family:'Bebas Neue',sans-serif;font-size:1.5em;letter-spacing:2px;color:var(--acc);margin-bottom:12px;text-align:center;}
.bg2{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.bp{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.bsh{width:44px;height:44px;background:#1e1e1e;border:2px dashed #3a3a3a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3em;color:#555;transition:all .2s;}
.bp.filled .bsh{background:#222;border:2px solid var(--acc);color:var(--acc);font-size:.95em;font-weight:800;}
.bp:hover .bsh{border-color:#666;}
.blbl{margin-top:4px;font-size:.68em;font-weight:700;color:#666;text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bp.filled .blbl{color:#ccc;}
.bpos{font-size:.58em;font-weight:700;color:#f5c51880;margin-top:1px;text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;justify-content:center;align-items:center;z-index:999;backdrop-filter:blur(6px);}
.md{background:#1c1c1c;border:1px solid #333;padding:26px;border-radius:18px;width:330px;box-shadow:0 20px 60px rgba(0,0,0,.8);text-align:center;}
.md h3{font-family:'Bebas Neue',sans-serif;font-size:1.7em;letter-spacing:2px;color:var(--acc);margin-bottom:14px;}
.md input,.md select{width:100%;padding:10px 13px;margin:6px 0;border:1px solid #3a3a3a;border-radius:10px;background:#111;color:#fff;font-family:'Nunito',sans-serif;font-size:.93em;font-weight:600;outline:none;transition:border-color .2s;}
.md input:focus,.md select:focus{border-color:var(--acc);}
.md select option{background:#222;}
.mbtns{display:flex;gap:8px;margin-top:16px;}
.btn{flex:1;padding:11px 0;border:none;border-radius:10px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.87em;transition:opacity .2s,transform .15s;}
.btn:hover{opacity:.88;transform:translateY(-2px);}
.bsv{background:#2e7d32;color:#fff;}
.brm{background:#b71c1c;color:#fff;}
.bcl{background:#333;color:#ccc;}
</style>
</head>
<body>
<header>
  <h1>&#9917; KADRO KURUCU PRO</h1>
  <p>Oyunculari surukle &amp; birak &bull; Mevki sec &bull; PNG olarak kaydet</p>
</header>

<div class="controls">
  <div class="cg">
    <label>Takim Ismi</label>
    <input type="text" id="tni" placeholder="Takim adi..." oninput="updName()">
  </div>
  <div class="cg">
    <label>Dizilis</label>
    <select id="fsel" onchange="chgForm()">
      <option value="4-4-2">4-4-2</option>
      <option value="4-3-3">4-3-3</option>
      <option value="4-2-3-1">4-2-3-1</option>
      <option value="3-5-2">3-5-2</option>
      <option value="5-3-2">5-3-2</option>
      <option value="4-1-4-1">4-1-4-1</option>
      <option value="3-4-3">3-4-3</option>
    </select>
  </div>
  <div class="cg">
    <label>Takim Logosu</label>
    <label class="fbtn" for="logu">&#128444; Logo Sec</label>
    <input type="file" id="logu" accept="image/*" onchange="loadLogo(event)">
  </div>
  <div class="cg">
    <label>Forma Gorseli</label>
    <label class="fbtn" for="jrsu">&#128085; Forma Sec</label>
    <input type="file" id="jrsu" accept="image/*" onchange="loadJersey(event)">
  </div>
  <div class="cg" style="justify-content:flex-end;">
    <label>Disa Aktar</label>
    <button class="sbtn" onclick="savePNG()">&#128229; PNG Olarak Kaydet</button>
  </div>
</div>

<div class="main">
  <div class="pw" id="expArea">
    <div class="th">
      <img id="tlogo" src="" alt="Logo">
      <div id="tname">TAKIM ISMI</div>
    </div>
    <div class="pitch" id="pitch">
      <div class="pl">
        <div class="lh"></div><div class="cc"></div><div class="cd"></div>
        <div class="bt"></div><div class="bb"></div>
        <div class="st"></div><div class="sb"></div>
      </div>
      <div id="pl2"></div>
    </div>
    <p class="hint">&#10022; Oyunculari suruklererek istedigin yere tasi</p>
  </div>

  <div class="side">
    <h2>&#129681; Yedekler</h2>
    <div class="bg2" id="bench"></div>
  </div>
</div>

<div class="mo" id="modal">
  <div class="md">
    <h3>Oyuncu Duzenle</h3>
    <input type="text" id="pname" placeholder="Oyuncu Adi (orn: Icardi)">
    <input type="number" id="pnum" placeholder="Forma Numarasi (orn: 9)" min="1" max="99">
    <select id="ppos">
      <option value="">&#8212; Mevki Secin &#8212;</option>
      <option value="Kaleci">Kaleci</option>
      <option value="Sol Bek">Sol Bek</option>
      <option value="Stoper">Stoper</option>
      <option value="Sag Bek">Sag Bek</option>
      <option value="On Libero">On Libero</option>
      <option value="Orta Saha">Orta Saha</option>
      <option value="Ofansif OS">Ofansif Orta Saha</option>
      <option value="Defansif OS">Defansif Orta Saha</option>
      <option value="Sol Kanat">Sol Kanat</option>
      <option value="Sag Kanat">Sag Kanat</option>
      <option value="Santrafor">Santrafor</option>
    </select>
    <div class="mbtns">
      <button class="btn bcl" onclick="closeM()">Iptal</button>
      <button class="btn brm" onclick="removeP()">Temizle</button>
      <button class="btn bsv" onclick="saveP()">Kaydet</button>
    </div>
  </div>
</div>

<script>
const FORMS={
  "4-4-2":[[1],[4],[4],[2]],
  "4-3-3":[[1],[4],[3],[3]],
  "4-2-3-1":[[1],[4],[2],[3],[1]],
  "3-5-2":[[1],[3],[5],[2]],
  "5-3-2":[[1],[5],[3],[2]],
  "4-1-4-1":[[1],[4],[1],[4],[1]],
  "3-4-3":[[1],[3],[4],[3]]
};

let selEl=null, isBench=false, jerseyUrl=null, curForm="4-4-2", isDrag=false;

function updName(){
  const v=document.getElementById('tni').value;
  document.getElementById('tname').textContent=v||'TAKIM ISMI';
}

function loadLogo(e){
  const f=e.target.files[0]; if(!f)return;
  const img=document.getElementById('tlogo');
  img.src=URL.createObjectURL(f); img.style.display='block';
}

function loadJersey(e){
  const f=e.target.files[0]; if(!f)return;
  jerseyUrl=URL.createObjectURL(f);
  document.querySelectorAll('.player').forEach(p=>{
    const s=p.querySelector('.shirt');
    if(s){s.style.backgroundImage=`url(${jerseyUrl})`;s.style.backgroundSize='cover';s.style.backgroundPosition='center';s.style.borderRadius='10px';}
    p.classList.add('hj');
  });
}

function savePNG(){
  if(typeof html2canvas==='undefined'){alert('html2canvas yukleniyor, lutfen bekleyin.');return;}
  const area=document.getElementById('expArea');
  const hint=area.querySelector('.hint');
  if(hint)hint.style.display='none';
  html2canvas(area,{backgroundColor:'#181818',scale:2,useCORS:true,allowTaint:true,logging:false})
  .then(canvas=>{
    if(hint)hint.style.display='';
    const nm=document.getElementById('tni').value.trim()||'kadro';
    const a=document.createElement('a');
    a.download=nm+'-kadro.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  }).catch(()=>{if(hint)hint.style.display='';alert('PNG kaydedilemedi.');});
}

function renderPitch(fk){
  curForm=fk;
  const layer=document.getElementById('pl2');
  layer.innerHTML='';
  const rows=FORMS[fk], pH=560, pW=390, rC=rows.length;
  rows.forEach((cols,ri)=>{
    const cc=cols[0];
    const yF=(ri+0.5)/rC;
    const y=pH-yF*pH;
    for(let c=0;c<cc;c++){
      const x=(c+1)/(cc+1)*pW;
      addPlayer(x,y,layer);
    }
  });
}

function addPlayer(x,y,container){
  const el=document.createElement('div');
  el.className='player';
  el.style.left=x+'px';
  el.style.top=y+'px';
  const jSty=jerseyUrl?`background-image:url(${jerseyUrl});background-size:cover;background-position:center;border-radius:10px;`:'';
  el.innerHTML=`<div class="shirt" style="${jSty}">+</div><div class="pname">Ekle</div><div class="ppos"></div>`;
  if(jerseyUrl)el.classList.add('hj');
  el.addEventListener('click',()=>{if(!isDrag)openM(el,false);});
  drag(el);
  container.appendChild(el);
}

function drag(el){
  let sx,sy,ol,ot,moved=false;
  function start(e){
    moved=false; isDrag=false;
    const t=e.touches?e.touches[0]:e;
    sx=t.clientX; sy=t.clientY;
    ol=parseFloat(el.style.left); ot=parseFloat(el.style.top);
    el.style.zIndex=999; el.style.transition='none';
    document.addEventListener('mousemove',move);
    document.addEventListener('touchmove',move,{passive:false});
    document.addEventListener('mouseup',end);
    document.addEventListener('touchend',end);
  }
  function move(e){
    if(e.cancelable)e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    const dx=t.clientX-sx, dy=t.clientY-sy;
    if(!moved&&Math.sqrt(dx*dx+dy*dy)>5){moved=true;isDrag=true;}
    if(!moved)return;
    const p=document.getElementById('pitch').getBoundingClientRect();
    el.style.left=Math.max(22,Math.min(p.width-22,ol+dx))+'px';
    el.style.top=Math.max(22,Math.min(p.height-22,ot+dy))+'px';
  }
  function end(){
    el.style.zIndex=3; el.style.transition='';
    document.removeEventListener('mousemove',move);
    document.removeEventListener('touchmove',move);
    document.removeEventListener('mouseup',end);
    document.removeEventListener('touchend',end);
    setTimeout(()=>{isDrag=false;},60);
  }
  el.addEventListener('mousedown',start);
  el.addEventListener('touchstart',start,{passive:true});
}

function chgForm(){
  const v=document.getElementById('fsel').value;
  if(!confirm('Dizilisi degistirmek sahadaki oyunculari sifirlar. Devam edilsin mi?')){
    document.getElementById('fsel').value=curForm; return;
  }
  renderPitch(v);
}

function renderBench(){
  const c=document.getElementById('bench'); c.innerHTML='';
  for(let i=0;i<7;i++){
    const el=document.createElement('div');
    el.className='bp';
    el.innerHTML=`<div class="bsh">+</div><div class="blbl">Yedek</div><div class="bpos"></div>`;
    el.addEventListener('click',()=>openM(el,true));
    c.appendChild(el);
  }
}

const modal=document.getElementById('modal');

function openM(el,bench){
  selEl=el; isBench=bench;
  if(el.classList.contains('filled')){
    const lb=el.querySelector('.pname,.blbl');
    const nu=el.querySelector('.shirt,.bsh');
    const po=el.querySelector('.ppos,.bpos');
    document.getElementById('pname').value=lb?lb.textContent:'';
    const nt=nu?nu.textContent:'';
    document.getElementById('pnum').value=/^\d+$/.test(nt)?nt:'';
    document.getElementById('ppos').value=po?po.textContent:'';
  } else {
    document.getElementById('pname').value='';
    document.getElementById('pnum').value='';
    document.getElementById('ppos').value='';
  }
  modal.style.display='flex';
  setTimeout(()=>document.getElementById('pname').focus(),80);
}

function closeM(){modal.style.display='none';selEl=null;}

function saveP(){
  if(!selEl)return;
  const nm=document.getElementById('pname').value.trim();
  const nu=document.getElementById('pnum').value.trim();
  const po=document.getElementById('ppos').value;
  if(!nm||!nu){alert('Lutfen oyuncu adi ve forma numarasi girin.');return;}
  const lb=selEl.querySelector('.pname,.blbl');
  const sh=selEl.querySelector('.shirt,.bsh');
  const ps=selEl.querySelector('.ppos,.bpos');
  if(lb)lb.textContent=nm;
  if(sh)sh.textContent=nu;
  if(ps)ps.textContent=po;
  selEl.classList.add('filled');
  if(!isBench&&jerseyUrl&&sh){
    sh.style.backgroundImage=`url(${jerseyUrl})`;
    sh.style.backgroundSize='cover';
    sh.style.backgroundPosition='center';
    sh.style.borderRadius='10px';
    selEl.classList.add('hj');
  }
  closeM();
}

function removeP(){
  if(!selEl)return;
  const lb=selEl.querySelector('.pname,.blbl');
  const sh=selEl.querySelector('.shirt,.bsh');
  const ps=selEl.querySelector('.ppos,.bpos');
  if(lb)lb.textContent=isBench?'Yedek':'Ekle';
  if(sh){sh.textContent='+';sh.style.backgroundImage='';sh.style.borderRadius='';}
  if(ps)ps.textContent='';
  selEl.classList.remove('filled','hj');
  closeM();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
window.addEventListener('load',()=>{renderPitch('4-4-2');renderBench();});
</script>
</body>
</html>
